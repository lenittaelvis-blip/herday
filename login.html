<!DOCTYPE html>
<html>

<head>
    <title>Login - HerDay</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="auth-body">

<div class="auth-wrapper">

    <!-- LEFT SIDE (IMAGE + TEXT) -->
    <div class="auth-left">

        <img src="/static/women_wellness.png" class="auth-image">

        <h1 class="brand-title">HerDay</h1>

        <p class="brand-text">
            Your companion for women's wellbeing,
            productivity, and everyday balance.
        </p>

        <!--<div class="brand-features">
            <p>🌿 Wellness Support</p>
            <p>📅 Smart Daily Planning</p>
            <p>💛 Emotional Guidance</p>
        </div>-->

    </div>


    <!-- RIGHT SIDE (LOGIN FORM) -->
    <div class="auth-right">

        <div class="auth-container">

            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Login to continue your journey</p>

            <form method="POST">

                <input type="email" name="email" placeholder="Email" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Login ✨</button>

            </form>

            <p class="auth-link">
                Don't have an account?
                <a href="/register">Register</a>
            </p>

        </div>

    </div>

</div>

</body>

</html>
